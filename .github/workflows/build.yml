name: 构建 blackhole.exe

# Windows 专用 MinGW (MSYS2 ucrt64) 构建流水线。
# 触发条件：
#   - push / pull_request 到 main：构建 + 同步到「持续构建」滚动 Release
#   - 推送 v*.*.* tag：创建正式版本 Release（如 v1.2.3）
#   - 手动触发 (workflow_dispatch)
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # 创建 / 更新 Release 需要写权限

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows 构建 (MinGW ucrt64)

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置 MSYS2 (ucrt64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          # 工具链 + GLFW3。windres 随 mingw-w64-ucrt-x86_64-gcc 自带，无需额外安装。
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-glfw

      - name: 显示工具链版本
        shell: msys2 {0}
        run: |
          echo "===== g++ 版本 ====="
          g++ --version
          echo "===== windres 版本 ====="
          windres --version
          echo "===== GLFW 库文件 ====="
          ls "$MSYSTEM_PREFIX/lib/" | grep -i glfw || true

      - name: 编译资源（嵌入图标）
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          mkdir -p build
          # --use-temp-file 规避 windres 在 Windows 上的 popen bug（见 CMakeLists.txt 注释）
          windres --use-temp-file --output-format=coff --input-format=rc \
                  -o build/resource.o resource.rc
          echo "图标资源编译完成: build/resource.o"

      - name: 编译 blackhole.exe
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          echo "开始编译..."
          g++ -std=c++17 -O2 -fexec-charset=UTF-8 \
              -o build/blackhole.exe \
              src/main.cpp \
              src/capture_wgc.cpp \
              src/capture_dxgi.cpp \
              src/gl_texture.cpp \
              src/gui_config.cpp \
              src/win32_gl.cpp \
              src/imgui/imgui.cpp \
              src/imgui/imgui_draw.cpp \
              src/imgui/imgui_widgets.cpp \
              src/imgui/imgui_tables.cpp \
              src/imgui/imgui_impl_glfw.cpp \
              src/imgui/imgui_impl_opengl3.cpp \
              build/resource.o \
              -I src/imgui \
              -I "$MSYSTEM_PREFIX/include" \
              -L "$MSYSTEM_PREFIX/lib" \
              -lglfw3 -lopengl32 -lgdi32 -ld3d11 -ldxgi \
              -lruntimeobject -ldwmapi -lcomctl32 -lole32 \
              -mwindows
          echo "编译成功: build/blackhole.exe"
          ls -la build/blackhole.exe

      - name: 收集运行时文件（着色器 + DLL）
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          mkdir -p build/shaders
          echo "复制着色器和配置..."
          cp -f shaders/*            build/shaders/
          cp -f blackhole.glsl       build/
          cp -f blackhole_presets.txt build/
          echo "复制 MinGW / GLFW 运行时 DLL..."
          cp -f "$MSYSTEM_PREFIX/bin/glfw3.dll"            build/
          cp -f "$MSYSTEM_PREFIX/bin/libgcc_s_seh-1.dll"   build/
          cp -f "$MSYSTEM_PREFIX/bin/libstdc++-6.dll"     build/
          cp -f "$MSYSTEM_PREFIX/bin/libwinpthread-1.dll" build/
          echo "===== 最终 build/ 目录 ====="
          ls -la build/

      - name: 打包为 ZIP 压缩包
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zipName = "blackhole-windows-x64.zip"
          # build/* 通配：把 build 内的内容直接放到 zip 根目录（不嵌套一层 build 文件夹）
          Compress-Archive -Path "build/*" -DestinationPath $zipName -Force
          $info = Get-Item $zipName
          "{0}  ({1:N2} MB)" -f $zipName, ($info.Length / 1MB)
          Get-ChildItem $zipName

      - name: 上传构建产物（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: blackhole-windows-x64-zip
          path: blackhole-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

      # 构建结束后发布到 GitHub Releases：
      #   - 推送 v*.*.* tag → 创建/更新同名正式版本 Release（如 v1.2.3）
      #   - push 到 main   → 持续更新「持续构建」滚动预发布 Release
      #   - PR / 手动      → 不发布（仅上传 Artifact）
      - name: 发布到 Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'continuous' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Blackhole {0}', github.ref_name) || 'Blackhole 持续构建' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          overwrite_files: true
          # 每次发布都生成自上次 tag 以来的 commit 列表作为说明
          generate_release_notes: true
          body: |
            ## Blackhole Windows 构建

            下载方式：
            1. 下载下方的 `blackhole-windows-x64.zip`
            2. 解压到任意目录，双击 `blackhole.exe` 运行

            包含文件：
            - `blackhole.exe` — 主程序
            - `glfw3.dll` / `libgcc_s_seh-1.dll` / `libstdc++-6.dll` / `libwinpthread-1.dll` — 运行时依赖
            - `shaders/` — GLSL 着色器
            - `blackhole.glsl` — 黑洞主着色器
            - `blackhole_presets.txt` — 预设配置（v4）
          files: |
            blackhole-windows-x64.zip
